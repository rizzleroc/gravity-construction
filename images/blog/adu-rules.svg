<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="ADU in Santa Cruz illustration">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1418"/>
      <stop offset="100%" stop-color="#17212a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg2)"/>
  <!-- Main house -->
  <g transform="translate(120,200)">
    <polygon points="0,80 150,0 300,80" fill="#214236"/>
    <rect x="20" y="80" width="260" height="180" fill="#253038"/>
    <rect x="60" y="140" width="60" height="80" fill="#3fa9ae" opacity="0.4"/>
    <rect x="170" y="140" width="60" height="80" fill="#3fa9ae" opacity="0.4"/>
    <rect x="125" y="180" width="50" height="80" fill="#f5a524"/>
  </g>
  <!-- Arrow -->
  <g transform="translate(460,330)" stroke="#f5a524" stroke-width="4" fill="none">
    <line x1="0" y1="0" x2="80" y2="0"/>
    <polyline points="60,-15 80,0 60,15"/>
  </g>
  <!-- Small ADU -->
  <g transform="translate(580,280)">
    <polygon points="0,50 90,0 180,50" fill="#1f6a6e"/>
    <rect x="10" y="50" width="160" height="110" fill="#253038"/>
    <rect x="30" y="80" width="40" height="50" fill="#3fa9ae" opacity="0.4"/>
    <rect x="110" y="80" width="40" height="50" fill="#3fa9ae" opacity="0.4"/>
    <rect x="75" y="105" width="30" height="55" fill="#f5a524"/>
  </g>
  <!-- Title -->
  <text x="820" y="240" font-family="Barlow Condensed, sans-serif" font-weight="900" font-size="52" fill="#f2f4f2">ADU Rules,</text>
  <text x="820" y="300" font-family="Barlow Condensed, sans-serif" font-weight="900" font-size="52" fill="#f5a524">Cost &amp; Timeline</text>
  <text x="820" y="350" font-family="Inter, sans-serif" font-size="22" fill="#b9c4c6">Santa Cruz County · 2026</text>
  <!-- Measurement line under buildings -->
  <g transform="translate(120,490)" stroke="#b9c4c6" stroke-width="1" opacity="0.5">
    <line x1="0" y1="0" x2="640" y2="0" stroke-dasharray="6 4"/>
  </g>
  <text x="200" y="515" font-family="Inter, sans-serif" font-size="14" fill="#85939a">Primary residence + up to 1,200 sq ft detached ADU</text>
</svg>
