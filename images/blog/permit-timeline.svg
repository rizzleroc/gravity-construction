<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Santa Cruz permit timeline illustration">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1418"/>
      <stop offset="100%" stop-color="#17212a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg3)"/>
  <!-- Timeline -->
  <line x1="120" y1="400" x2="1080" y2="400" stroke="#3fa9ae" stroke-width="4"/>
  <!-- Stages -->
  <g font-family="Inter, sans-serif" text-anchor="middle">
    <g transform="translate(180,400)">
      <circle r="18" fill="#f5a524"/>
      <text y="60" fill="#f2f4f2" font-size="16" font-weight="600">Pre-submittal</text>
      <text y="82" fill="#85939a" font-size="13">1–4 wks</text>
    </g>
    <g transform="translate(400,400)">
      <circle r="18" fill="#f5a524"/>
      <text y="60" fill="#f2f4f2" font-size="16" font-weight="600">Plan check</text>
      <text y="82" fill="#85939a" font-size="13">4–10 wks</text>
    </g>
    <g transform="translate(620,400)">
      <circle r="18" fill="#f5a524"/>
      <text y="60" fill="#f2f4f2" font-size="16" font-weight="600">Other agencies</text>
      <text y="82" fill="#85939a" font-size="13">parallel</text>
    </g>
    <g transform="translate(840,400)">
      <circle r="18" fill="#f5a524"/>
      <text y="60" fill="#f2f4f2" font-size="16" font-weight="600">Issuance</text>
      <text y="82" fill="#85939a" font-size="13">1–2 wks</text>
    </g>
    <g transform="translate(1020,400)">
      <circle r="18" fill="#ff7a59"/>
      <text y="60" fill="#f2f4f2" font-size="16" font-weight="600">Build</text>
      <text y="82" fill="#85939a" font-size="13">on site</text>
    </g>
  </g>
  <!-- Title -->
  <text x="600" y="180" font-family="Barlow Condensed, sans-serif" font-weight="900" font-size="60" fill="#f2f4f2" text-anchor="middle">Santa Cruz Building Permits</text>
  <text x="600" y="240" font-family="Inter, sans-serif" font-size="24" fill="#b9c4c6" text-anchor="middle">What actually happens, and how long it takes</text>
  <!-- Clipboard icon -->
  <g transform="translate(500,280)" stroke="#3fa9ae" stroke-width="3" fill="none">
    <rect x="0" y="0" width="80" height="100" rx="4"/>
    <rect x="20" y="-10" width="40" height="20" fill="#3fa9ae" rx="2"/>
    <line x1="15" y1="30" x2="65" y2="30"/>
    <line x1="15" y1="50" x2="55" y2="50"/>
    <line x1="15" y1="70" x2="60" y2="70"/>
  </g>
</svg>
